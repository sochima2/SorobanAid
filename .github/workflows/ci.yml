name: CI

on:
  push:
    branches: [main, master, work]
  pull_request:

jobs:
  quality:
    name: Static quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run CI checks
        run: npm run ci
